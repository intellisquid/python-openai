name: Android CI

on:
  push:
    branches: [main]
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  pull_request:
    paths: ["android/**", ".github/workflows/android-ci.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: android/app/build/reports/tests/testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-todo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Manual-trigger only: publishes the debug APK as a GitHub Release asset, so it's a
      # stable, phone-friendly direct-download link instead of a temporary Actions artifact.
      - name: Publish APK to a GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Dashboard To-Do debug build #${{ github.run_number }}
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
